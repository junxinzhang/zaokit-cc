  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <text x="256" y="296" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="900" font-size="200" fill="url(#txt)" filter="url(#glow)">ZAO</text>
